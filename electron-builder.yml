appId: com.cc-switch-plus.app
productName: CC Switch Plus
copyright: Copyright © 2026
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - "!out/renderer/**/*"
extraResources:
  - from: out/renderer
    to: renderer
  - from: build/icon.icns
    to: icon.icns
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
dmg:
  title: CC Switch Plus
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380
